<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tracking | Women Safety</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1E50FF;
            --danger: #EF4444;
            --bg: #0F172A;
            --card: #1E293B;
            --text: #F8FAFC;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #map {
            flex: 1;
            width: 100%;
            z-index: 1;
        }

        .header {
            padding: 16px 24px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 1000;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .status-badge {
            padding: 6px 12px;
            background: rgba(34, 197, 94, 0.2);
            color: #4ADE80;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ADE80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        .controls {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-card {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .label { color: #94A3B8; font-size: 13px; }
        .value { font-weight: 600; font-size: 14px; }

        .btn-maps {
            width: 100%;
            padding: 16px;
            background: white;
            color: #1E293B;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-maps:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(255, 255, 255, 0.1);
        }

        /* Marker Styling */
        .user-marker {
            width: 20px;
            height: 20px;
            background: var(--primary);
            border: 4px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(30, 80, 255, 0.5);
        }

        .user-marker-container {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        <p>Connecting to secure tracking channel...</p>
    </div>

    <div class="header">
        <div class="logo">
            <div class="logo-icon">WS</div>
            <div>
                <h2 style="font-size: 16px;">Secure Tracking</h2>
                <p id="time-ago" style="font-size: 11px; color: #94A3B8;">Updating live...</p>
            </div>
        </div>
        <div class="status-badge">
            <div class="status-dot"></div>
            LIVE
        </div>
    </div>

    <div id="map"></div>

    <div class="controls">
        <div class="info-card">
            <div class="info-row">
                <span class="label">Heading to</span>
                <span class="value" id="destination">Loading...</span>
            </div>
            <div id="last-seen-container" class="info-row">
                <span class="label">Last Seen</span>
                <span class="value" id="last-seen">Just now</span>
            </div>
        </div>
        <a id="maps-link" href="#" class="btn-maps" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/39/Google_Maps_icon_%282020%29.svg" width="20" alt="GMaps">
            Open in Google Maps App
        </a>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        // Configuration
        const API_BASE = '/api/trusted-dashboard/public/track';
        const POLL_INTERVAL = 8000; // 8 seconds

        let map, userMarker, historyTrail;
        let trailPoints = [];
        let isFirstLoad = true;

        if (!token) {
            document.body.innerHTML = '<div style="padding: 40px; text-align: center;"><h1>Invalid Link</h1><p>This tracking session link is invalid or has expired.</p></div>';
        } else {
            initMap();
            fetchLocation();
            setInterval(fetchLocation, POLL_INTERVAL);
        }

        function initMap() {
            // Dark mode tiles (CartoDB DarkMatter)
            map = L.map('map', { zoomControl: false }).setView([0, 0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
        }

        async function fetchLocation() {
            try {
                const response = await fetch(`${API_BASE}/${token}`);
                const result = await response.json();

                if (result.success) {
                    const { latitude, longitude, timestamp, destination } = result.data;
                    updateUI(latitude, longitude, timestamp, destination);
                    
                    // Hide loading on first success
                    const loading = document.getElementById('loading');
                    if (loading && loading.style.display !== 'none') {
                        loading.style.opacity = '0';
                        setTimeout(() => loading.style.display = 'none', 500);
                    }
                } else {
                    document.getElementById('last-seen').innerText = "Session Offline";
                    document.getElementById('last-seen').style.color = "#EF4444";
                }
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        function updateUI(lat, lng, timestamp, dest) {
            const pos = [lat, lng];
            
            // Add to trail
            if (trailPoints.length === 0 || 
                Math.abs(trailPoints[trailPoints.length-1][0] - lat) > 0.00001 || 
                Math.abs(trailPoints[trailPoints.length-1][1] - lng) > 0.00001) {
                trailPoints.push(pos);
            }

            // Update Marker
            if (!userMarker) {
                userMarker = L.marker(pos, {
                    icon: L.divIcon({
                        className: 'user-marker-container',
                        html: '<div class="user-marker"></div>',
                        iconSize: [20, 20],
                        iconAnchor: [10, 10]
                    })
                }).addTo(map);
                map.setView(pos, 16);
            } else {
                userMarker.setLatLng(pos);
            }

            // Update Trail
            if (!historyTrail) {
                historyTrail = L.polyline(trailPoints, {
                    color: '#3B82F6',
                    weight: 3,
                    opacity: 0.6,
                    dashArray: '5, 10'
                }).addTo(map);
            } else {
                historyTrail.setLatLngs(trailPoints);
            }

            // Auto-center if moved significantly
            if (isFirstLoad) {
                map.setView(pos, 16);
                isFirstLoad = false;
            } else {
                const mapCenter = map.getCenter();
                const dist = map.distance(mapCenter, pos);
                if (dist > 100) { // Re-center if moved > 100 meters from view center
                    map.panTo(pos);
                }
            }

            // Update Info
            document.getElementById('destination').innerText = (dest && dest.address) ? dest.address : "Guardian Mode Tracking";
            document.getElementById('maps-link').href = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
            
            const date = new Date(timestamp);
            document.getElementById('last-seen').innerText = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
    </script>
</body>
</html>
